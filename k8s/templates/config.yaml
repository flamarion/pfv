apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  APP_ENV: {{ .Values.env.APP_ENV | quote }}
  APP_NAME: "PFV2"
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
  REDIS_URL: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/0"
  BACKEND_CORS_ORIGINS: "https://{{ .Values.ingress.host }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  # Populate these via Helm values, sealed secrets, or external secrets operator
  DATABASE_URL: "mysql+aiomysql://{{ .Values.mysql.user }}:CHANGE_ME@{{ .Values.mysql.host }}:{{ .Values.mysql.port }}/{{ .Values.mysql.database }}"
  JWT_SECRET_KEY: "CHANGE_ME"
