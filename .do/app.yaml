  - name: frontend
    github:
      repo: flamarion/pfv
      branch: main
      deploy_on_push: false
    source_dir: frontend
    dockerfile_path: frontend/Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    # The probe hits frontend:3000/health directly (not via the ingress) so
    # the /health prefix being routed to backend at the ingress layer is
    # irrelevant here. app/health/route.ts returns 200 once Next.js is up.
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: HOSTNAME
        scope: RUN_AND_BUILD_TIME
        value: "0.0.0.0"

# Pre-deploy job: run Alembic migrations exactly once before any backend
# replica starts. This is the canonical "init container" pattern for App
# Platform — the new revision is held back until the job exits 0, so a
# long migration never causes the backend's serving probe to fail. The
# k8s/ Helm chart uses a matching initContainer in templates/backend.yaml.
#
# DATABASE_URL is bound here directly (App Platform does not auto-inherit
# secrets across components). Same encrypted reference the backend service
# uses above; same "safe to commit" reasoning.
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: flamarion/pfv
      branch: main
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    instance_count: 1
    instance_size_slug: basic-xxs
    run_command: alembic upgrade head
    envs:
      - key: APP_ENV
        scope: RUN_AND_BUILD_TIME
        value: "production"
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:PW7zpRXasYFhIiOoqMNopBxpqujwXZCO:LB8zQbjWAG4N99+0Q3m4fwakl3DTHqrPo9PH5r+JkSVSouY4n8pTl0ISC5FLVUBMPo92zTCxPIzGnfiKKbDEq5oxbKyM1g+jyVdUoXOBgogEWvJ84R5yvWC8SQVNQrdKsplwP2YScTPlpewRMw==]
