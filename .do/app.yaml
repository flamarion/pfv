name: pfv
region: ams
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /health
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /ready
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: frontend
services:
  - name: backend
    github:
      repo: flamarion/pfv
      branch: main
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
    # Secrets (DATABASE_URL, REDIS_URL, JWT_SECRET_KEY, MFA_ENCRYPTION_KEY)
    # are configured in DO console and inherited by preview apps.
    # Only non-secret env vars are listed here.
    envs:
      - key: APP_ENV
        value: "production"
      - key: APP_NAME
        value: "The Better Decision"
      - key: LOG_LEVEL
        value: "INFO"
      - key: COOKIE_SECURE
        value: "true"
      - key: MAILGUN_REGION
        value: "eu"

  - name: frontend
    github:
      repo: flamarion/pfv
      branch: main
      deploy_on_push: false
    source_dir: frontend
    dockerfile_path: frontend/Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    # The probe hits frontend:3000/health directly (not via the ingress) so
    # the /health prefix being routed to backend at the ingress layer is
    # irrelevant here. app/health/route.ts returns 200 once Next.js is up.
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: NEXT_PUBLIC_API_URL
        value: ""
      - key: HOSTNAME
        value: "0.0.0.0"

# Pre-deploy job: run Alembic migrations exactly once before any backend
# replica starts. This is the canonical "init container" pattern for App
# Platform — the new revision is held back until the job exits 0, so a
# long migration never causes the backend's serving probe to fail. The
# k8s/ Helm chart uses a matching initContainer in templates/backend.yaml.
#
# About the encrypted DATABASE_URL value: App Platform's `EV[...]` blobs
# are encrypted with this app's per-app key, so the plaintext is unreadable
# outside DO. They are safe to commit and are the only way to keep the
# spec self-contained — App Platform does not auto-inherit secrets across
# components, so a brand-new PRE_DEPLOY job otherwise has no DATABASE_URL
# and fails on first deploy. To re-issue from scratch (e.g., new app),
# `doctl apps spec get <app-id>` will surface fresh `EV[...]` references
# you can paste in.
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: flamarion/pfv
      branch: main
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    instance_count: 1
    instance_size_slug: basic-xxs
    run_command: alembic upgrade head
    envs:
      - key: APP_ENV
        scope: RUN_AND_BUILD_TIME
        value: "production"
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:6hfpzR8vLg+7V8xAKnnPxKCH31YvJ/wq:zBRFCBWk4LU+PgCsbCyXe3B28BtGpFeQ+KHldE7sFKA9XXlkkM94KQVsAVtlqwShSj29XHQ8JJzACa3Q+bX5nmrByRe4JGPlMDUC2iV5gcGb074vQntKdL2/0RIGhycbbbczpJUZubF3vh910KhN8toTPIS0bwpIvxHSvd8coPcI]
