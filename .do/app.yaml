name: pfv
region: ams
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /health
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /ready
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: frontend
services:
  - name: backend
    github:
      repo: flamarion/pfv
      branch: main
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: DATABASE_URL
        value: "placeholder-set-in-do-console"
        type: SECRET
      - key: REDIS_URL
        value: "placeholder-set-in-do-console"
        type: SECRET
      - key: JWT_SECRET_KEY
        value: "placeholder-set-in-do-console"
        type: SECRET
      - key: MFA_ENCRYPTION_KEY
        value: "placeholder-set-in-do-console"
        type: SECRET
      - key: APP_ENV
        value: "production"
      - key: APP_NAME
        value: "PFV2"
      - key: LOG_LEVEL
        value: "INFO"
      - key: BACKEND_CORS_ORIGINS
        value: "placeholder-update-after-deploy"
      - key: COOKIE_SECURE
        value: "true"
      - key: APP_URL
        value: "placeholder-update-after-deploy"

  - name: frontend
    github:
      repo: flamarion/pfv
      branch: main
      deploy_on_push: false
    source_dir: frontend
    dockerfile_path: frontend/Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_URL
        value: ""
      - key: HOSTNAME
        value: "0.0.0.0"
