name: pfv
region: ams
services:
  - name: backend
    github:
      repo: flamarion/pfv
      branch: main
      deploy_on_push: true
    source_dir: /backend
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
    routes:
      - path: /api
      - path: /health
      - path: /ready
    envs:
      - key: DATABASE_URL
        value: "placeholder-set-via-doctl"
        type: SECRET
      - key: REDIS_URL
        value: "placeholder-set-via-doctl"
        type: SECRET
      - key: JWT_SECRET_KEY
        value: "placeholder-set-via-doctl"
        type: SECRET
      - key: APP_ENV
        value: "production"
      - key: APP_NAME
        value: "PFV2"
      - key: LOG_LEVEL
        value: "INFO"
      - key: BACKEND_CORS_ORIGINS
        value: "placeholder-update-after-deploy"
      - key: COOKIE_SECURE
        value: "true"

  - name: frontend
    github:
      repo: flamarion/pfv
      branch: main
      deploy_on_push: true
    source_dir: /frontend
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_API_URL
        value: ""
      - key: HOSTNAME
        value: "0.0.0.0"
