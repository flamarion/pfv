name: Preview Deployment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      APP_NAME: pfv-preview-pr-${{ github.event.pull_request.number }}
      PROJECT_ID: 5c404689-358b-42c5-a8e2-f48a304d8298
      DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if preview app exists
        id: check
        run: |
          APP_ID=$(curl -s \
            -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/apps" \
            | jq -r ".apps[]? | select(.spec.name == \"$APP_NAME\") | .id // empty")

          if [ -n "$APP_ID" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update preview app
        id: deploy
        run: |
          SPEC=$(cat <<SPECEOF
          {
            "spec": {
              "name": "$APP_NAME",
              "region": "ams",
              "features": ["buildpack-stack=ubuntu-22"],
              "ingress": {
                "rules": [
                  {"match": {"path": {"prefix": "/api"}}, "component": {"name": "backend", "preserve_path_prefix": true}},
                  {"match": {"path": {"prefix": "/health"}}, "component": {"name": "backend", "preserve_path_prefix": true}},
                  {"match": {"path": {"prefix": "/ready"}}, "component": {"name": "backend", "preserve_path_prefix": true}},
                  {"match": {"path": {"prefix": "/"}}, "component": {"name": "frontend"}}
                ]
              },
              "services": [
                {
                  "name": "backend",
                  "github": {
                    "repo": "flamarion/pfv",
                    "branch": "${{ github.head_ref }}",
                    "deploy_on_push": false
                  },
                  "source_dir": "backend",
                  "dockerfile_path": "backend/Dockerfile",
                  "http_port": 8000,
                  "instance_count": 1,
                  "instance_size_slug": "basic-xxs",
                  "health_check": {
                    "http_path": "/health",
                    "initial_delay_seconds": 30,
                    "period_seconds": 15,
                    "timeout_seconds": 5,
                    "failure_threshold": 5
                  },
                  "envs": [
                    {"key": "DATABASE_URL", "value": "${{ secrets.PREVIEW_DATABASE_URL }}", "type": "SECRET", "scope": "RUN_AND_BUILD_TIME"},
                    {"key": "REDIS_URL", "value": "", "scope": "RUN_AND_BUILD_TIME"},
                    {"key": "JWT_SECRET_KEY", "value": "${{ secrets.PREVIEW_JWT_SECRET_KEY }}", "type": "SECRET", "scope": "RUN_AND_BUILD_TIME"},
                    {"key": "MFA_ENCRYPTION_KEY", "value": "${{ secrets.PREVIEW_MFA_ENCRYPTION_KEY }}", "type": "SECRET", "scope": "RUN_AND_BUILD_TIME"},
                    {"key": "APP_ENV", "value": "production", "scope": "RUN_AND_BUILD_TIME"},
                    {"key": "APP_NAME", "value": "PFV2-Preview", "scope": "RUN_AND_BUILD_TIME"},
                    {"key": "LOG_LEVEL", "value": "INFO", "scope": "RUN_AND_BUILD_TIME"},
                    {"key": "COOKIE_SECURE", "value": "true", "scope": "RUN_AND_BUILD_TIME"},
                    {"key": "BACKEND_CORS_ORIGINS", "value": "*", "scope": "RUN_AND_BUILD_TIME"},
                    {"key": "APP_URL", "value": "https://placeholder.ondigitalocean.app", "scope": "RUN_AND_BUILD_TIME"}
                  ]
                },
                {
                  "name": "frontend",
                  "github": {
                    "repo": "flamarion/pfv",
                    "branch": "${{ github.head_ref }}",
                    "deploy_on_push": false
                  },
                  "source_dir": "frontend",
                  "dockerfile_path": "frontend/Dockerfile",
                  "http_port": 3000,
                  "instance_count": 1,
                  "instance_size_slug": "basic-xxs",
                  "envs": [
                    {"key": "NEXT_PUBLIC_API_URL", "value": "", "scope": "RUN_AND_BUILD_TIME"},
                    {"key": "HOSTNAME", "value": "0.0.0.0", "scope": "RUN_AND_BUILD_TIME"}
                  ]
                }
              ]
            },
            "project_id": "$PROJECT_ID"
          }
          SPECEOF
          )

          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            APP_ID="${{ steps.check.outputs.app_id }}"
            # Remove project_id for update requests (only valid on create)
            UPDATE_SPEC=$(echo "$SPEC" | jq 'del(.project_id)')
            RESPONSE=$(curl -s -X PUT \
              -H "Authorization: Bearer $DO_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$UPDATE_SPEC" \
              "https://api.digitalocean.com/v2/apps/$APP_ID")
          else
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $DO_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$SPEC" \
              "https://api.digitalocean.com/v2/apps")
          fi

          APP_ID=$(echo "$RESPONSE" | jq -r '.app.id // empty')
          if [ -z "$APP_ID" ]; then
            echo "Error creating/updating app:"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
          echo "Preview app ID: $APP_ID"

      - name: Wait for deployment to complete
        id: wait
        run: |
          APP_ID="${{ steps.deploy.outputs.app_id }}"
          echo "Waiting for deployment..."
          for i in $(seq 1 60); do
            DATA=$(curl -s \
              -H "Authorization: Bearer $DO_TOKEN" \
              "https://api.digitalocean.com/v2/apps/$APP_ID")

            PHASE=$(echo "$DATA" | jq -r '.app.in_progress_deployment.phase // "NONE"')
            LIVE_URL=$(echo "$DATA" | jq -r '.app.live_url // .app.default_ingress // empty')

            echo "  Phase: $PHASE | URL: $LIVE_URL"

            if [ "$PHASE" = "NONE" ] || [ "$PHASE" = "null" ]; then
              echo "Deployment complete!"
              echo "live_url=$LIVE_URL" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$PHASE" = "ERROR" ]; then
              echo "::error::Deployment failed"
              echo "live_url=$LIVE_URL" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            sleep 15
          done
          echo "::error::Deployment timed out after 15 minutes"
          exit 1

      - name: Update APP_URL to match preview URL
        if: success()
        run: |
          APP_ID="${{ steps.deploy.outputs.app_id }}"
          LIVE_URL="${{ steps.wait.outputs.live_url }}"

          if [ -z "$LIVE_URL" ] || [ "$LIVE_URL" = "null" ]; then
            echo "No live URL available, skipping APP_URL update"
            exit 0
          fi

          # Get current spec and update APP_URL
          CURRENT_SPEC=$(curl -s \
            -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/apps/$APP_ID" \
            | jq '.app.spec')

          UPDATED_SPEC=$(echo "$CURRENT_SPEC" | jq --arg url "$LIVE_URL" '
            .services[0].envs |= map(
              if .key == "APP_URL" then .value = $url else . end
            )')

          curl -s -X PUT \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"spec\": $UPDATED_SPEC}" \
            "https://api.digitalocean.com/v2/apps/$APP_ID" > /dev/null

          echo "Updated APP_URL to $LIVE_URL"

      - name: Comment with preview URL
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.wait.outputs.live_url }}';
            if (!url) return;
            const body = [
              `**Preview deployed** to ${url}`,
              '',
              `Commit: \`${context.sha.slice(0, 7)}\``,
              `This preview will be deleted when the PR is closed.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Preview deployment failed.** [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            });
