---
- name: Install MySQL server
  ansible.builtin.apt:
    name:
      - mysql-server
      - python3-pymysql
    state: present

- name: Ensure MySQL is started and enabled
  ansible.builtin.service:
    name: mysql
    state: started
    enabled: true

# Ubuntu 24.04 ships MySQL 8 with auth_socket on root@localhost — we keep that
# default. Local maintenance is done via `sudo mysql` (the socket plugin
# authenticates by uid, no password needed). We deliberately do NOT manage a
# password for root@localhost here: the `mysql_user ... update_password:
# on_create` form only sets the password when the user is first created, and
# root already exists from the apt package install. Re-running this play with
# a rotated `mysql_root_password` would silently rewrite /root/.my.cnf to a
# password MySQL never accepted, breaking subsequent tasks and cron dumps.
# Cron dumps use the dedicated `mysql_backup` user below.

# All privileged mysql tasks pin login_user: root + login_unix_socket so they
# auth via root@localhost's auth_socket plugin regardless of whatever the
# mysql client would otherwise pick up from /root/.my.cnf (which exists from
# prior runs and points at the lower-privilege mysql_backup user).
- name: Create backup user (read-everything for mysqldump --single-transaction)
  community.mysql.mysql_user:
    login_user: root
    login_unix_socket: /var/run/mysqld/mysqld.sock
    name: "{{ mysql_backup_user }}"
    password: "{{ mysql_backup_password }}"
    host: localhost
    priv: "*.*:SELECT,LOCK TABLES,SHOW VIEW,EVENT,TRIGGER,RELOAD,PROCESS,REPLICATION CLIENT"
    plugin: mysql_native_password
    state: present

- name: Remove anonymous MySQL users
  community.mysql.mysql_user:
    login_user: root
    login_unix_socket: /var/run/mysqld/mysqld.sock
    name: ""
    host_all: true
    state: absent

- name: Remove MySQL test database
  community.mysql.mysql_db:
    login_user: root
    login_unix_socket: /var/run/mysqld/mysqld.sock
    name: test
    state: absent

- name: Create application database
  community.mysql.mysql_db:
    login_user: root
    login_unix_socket: /var/run/mysqld/mysqld.sock
    name: "{{ mysql_app_db }}"
    state: present
    encoding: utf8mb4
    collation: utf8mb4_0900_ai_ci

- name: Create application MySQL user (host=%)
  community.mysql.mysql_user:
    login_user: root
    login_unix_socket: /var/run/mysqld/mysqld.sock
    name: "{{ mysql_app_user }}"
    password: "{{ mysql_app_password }}"
    host: "%"
    priv: "{{ mysql_app_db }}.*:ALL"
    plugin: mysql_native_password
    state: present

# Drop /root/.my.cnf AFTER all privileged mysql_user / mysql_db tasks complete.
# The mysql client library reads /root/.my.cnf when present and authenticates
# as the user listed there (mysql_backup), which does not have CREATE DATABASE
# / CREATE USER privilege — so any privileged task that runs after this file
# exists fails with "Access denied for user 'pfv_backup'". The cron mysqldump
# is the only consumer that needs this file.
- name: Drop /root/.my.cnf so cron mysqldump runs non-interactively
  ansible.builtin.template:
    src: root.my.cnf.j2
    dest: /root/.my.cnf
    owner: root
    group: root
    mode: "0600"

- name: Drop pfv MySQL config override
  ansible.builtin.template:
    src: my.cnf.j2
    dest: /etc/mysql/mysql.conf.d/pfv.cnf
    owner: root
    group: root
    mode: "0644"
  notify: Restart mysql
